services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api_runtime
    container_name: symbolize-api
    env_file:
      - ./.env
    environment:
      PORT: ${PORT:-8080}
      CORS_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:80,http://127.0.0.1:80
      ARASAAC_BASE_URL: ${ARASAAC_BASE_URL:-https://api.arasaac.org/api}
    expose:
      - "8080"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend_runtime
    container_name: symbolize-frontend
    ports:
      - "80:8080"
    depends_on:
      - api
